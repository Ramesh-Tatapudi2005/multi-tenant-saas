version: '3.8'

services:
  # 1. DATABASE SERVICE (PostgreSQL)
  database:
    image: postgres:15
    container_name: database
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-saas_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. BACKEND SERVICE (Python FastAPI)
  backend:
    build: ./backend
    container_name: backend
    env_file: .env  # Injects JWT_SECRET and other root variables
    ports:
      - "5000:5000"
    environment:
      # These remain exactly as you had them
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-saas_db}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
      FRONTEND_URL: http://localhost:3000
    depends_on:
      database:
        condition: service_healthy

  # 3. FRONTEND SERVICE (React)
  frontend:
    build: ./frontend
    container_name: frontend
    env_file: .env  # Pulls the REACT_APP_API_URL for the frontend
    ports:
      - "3000:3000"
    environment:
      # Passes the API link to the React environment
      - REACT_APP_API_URL=${REACT_APP_API_URL}
    depends_on:
      - backend

volumes:
  db_data: